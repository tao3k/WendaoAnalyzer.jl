base_url = "http://127.0.0.1:18080"
route = "/rerank"
health_route = "/health"
schema_version = "v1"
timeout_secs = 15

[launch]
launcher_path = ".data/WendaoAnalyzer/scripts/run_analyzer_service.sh"
args = [
  "--service-mode",
  "stream",
  "--analyzer-config",
  ".data/WendaoAnalyzer/config/analyzer.example.toml",
  "--analyzer-strategy",
  "similarity_only",
  "--vector-weight",
  "0.35",
  "--similarity-weight",
  "0.65",
]
